      - {http_request_rate: 20.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
      - {http_request_rate: 3.0, http_error_rate: 0.18, http_latency_p95_seconds: 1.4}

  - scenario_id: ad-hard-10-mv-traffic-only
    split: hard
    mode: multivariate
    description: Traffic scale-up alone should often be TN (not joint fault)
    service: checkout-service
    label: normal
    absolute_threshold: 9.0
    features_series:
      - {http_request_rate: 20.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
      - {http_request_rate: 21.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
      - {http_request_rate: 19.0, http_error_rate: 0.03, http_latency_p95_seconds: 0.06}
      - {http_request_rate: 20.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
