  # --- Multivariate: joint outlier vs rate-only change ---
  - scenario_id: ad-hard-09-mv-joint-outlier
    split: hard
    mode: multivariate
    description: Rate drop + error + latency joint outlier
    service: checkout-service
    label: anomaly
    absolute_threshold: 9.0
    features_series:
      - {http_request_rate: 20.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
      - {http_request_rate: 21.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
