      - {http_request_rate: 22.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
      - {http_request_rate: 20.0, http_error_rate: 0.03, http_latency_p95_seconds: 0.06}
      - {http_request_rate: 19.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
      - {http_request_rate: 21.0, http_error_rate: 0.02, http_latency_p95_seconds: 0.05}
