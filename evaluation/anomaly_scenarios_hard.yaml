version: "1.0"
dataset_name: aiops-anomaly-hard
description: >
  L1 hard anomaly suite. Statistical methods only — absolute_threshold set
  extremely high so "manual" threshold cannot carry the label. Includes noise,
  missing values (as null skipped), concept drift, near-threshold, and
  multivariate conflict. Expect F1 well below the clean core suite.
scenarios:
  # --- Noise: anomaly buried in high variance (harder for z-score) ---
  - scenario_id: ad-hard-01-noisy-spike
    split: hard
    mode: univariate
    description: True spike amid high baseline noise
    service: checkout-service
    metric_name: http_error_rate
    label: anomaly
    # high absolute_threshold disables manual path in force_score
    absolute_threshold: 9.0
    values:
      - 0.08
      - 0.12
      - 0.05
      - 0.15
      - 0.09
      - 0.14
      - 0.06
      - 0.11
      - 0.13
      - 0.42

  - scenario_id: ad-hard-02-noisy-normal
    split: hard
    mode: univariate
    description: Noisy but no real level shift (TN under stats-only)
    service: checkout-service
    metric_name: http_error_rate
    label: normal
    absolute_threshold: 9.0
    values:
      - 0.08
      - 0.12
      - 0.05
      - 0.15
      - 0.09
      - 0.14
      - 0.06
      - 0.11
      - 0.13
      - 0.10

  # --- Slow drift (gradual) without crossing a "demo" absolute thr ---
  - scenario_id: ad-hard-03-slow-drift-anomaly
    split: hard
    mode: univariate
    description: Very gradual error rise — last point elevated vs early baseline
    service: payment-service
    metric_name: http_error_rate
    label: anomaly
    absolute_threshold: 9.0
    values:
      - 0.02
      - 0.025
      - 0.03
      - 0.035
      - 0.04
      - 0.05
      - 0.06
      - 0.08
      - 0.10
      - 0.14

  - scenario_id: ad-hard-04-slow-drift-normal
    split: hard
    mode: univariate
    description: Mild upward noise within healthy band
    service: payment-service
    metric_name: http_error_rate
    label: normal
    absolute_threshold: 9.0
    values:
      - 0.02
      - 0.022
      - 0.021
      - 0.025
      - 0.023
      - 0.024
      - 0.026
      - 0.025
      - 0.027
      - 0.028

  # --- Near-threshold without absolute helper ---
  - scenario_id: ad-hard-05-near-anomaly-stats
    split: hard
    mode: univariate
    description: Final point only mildly high vs short history
    service: checkout-service
    metric_name: http_error_rate
    label: anomaly
    absolute_threshold: 9.0
    values:
      - 0.01
      - 0.01
      - 0.012
      - 0.011
      - 0.01
      - 0.012
      - 0.01
      - 0.011
      - 0.01
      - 0.09

  - scenario_id: ad-hard-06-near-normal-stats
    split: hard
    mode: univariate
    description: Mild bump still consistent with noise
    service: checkout-service
    metric_name: http_error_rate
    label: normal
    absolute_threshold: 9.0
    values:
      - 0.01
      - 0.012
      - 0.011
      - 0.013
      - 0.01
      - 0.014
      - 0.012
      - 0.011
      - 0.013
      - 0.03

  # --- Latency with seasonality + spike ---
  - scenario_id: ad-hard-07-seasonal-latency-spike
    split: hard
    mode: univariate
    description: Seasonal latency then true spike
    service: payment-service
    metric_name: http_latency_p95_seconds
    label: anomaly
    absolute_threshold: 99.0
