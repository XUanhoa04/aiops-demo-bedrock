      service: checkout-service
      value: 0.4
    - name: http_error_rate
      service: payment-service
      value: 0.5
    logs:
    - service: payment-service
      line: ERROR payment-service database connection pool exhaustion
    - service: checkout-service
      line: 'ERROR payment failed: 502 payment-service database connection pool exhaustion'
    traces:
    - service: checkout-service
      pattern: child payment span error
      duration_ms: 2000
      status: error
  ground_truth_root_cause: payment-service database connection pool exhaustion
  affected_services:
  - payment-service
  - checkout-service
  expected_actions:
  - Fix payment DB pool first (not checkout restarts)
  keywords:
  - payment-service
  - connection pool
  - cascade
  live_chaos:
    service: payment
    error_rate: 0.5
    extra_latency_ms: 300
    fault_mode: db_pool
  split: core
  is_fault: true
- scenario_id: rca-08-traffic-spike-only
  description: Benign traffic spike — elevated RPS, mild latency, low errors (no true RCA).
  symptoms:
    metrics:
    - name: http_request_rate
      service: checkout-service
      value: 80.0
    - name: http_latency_p95_seconds
      service: checkout-service
      value: 0.25
    - name: http_error_rate
      service: checkout-service
      value: 0.02
    logs: []
    traces:
    - service: checkout-service
      pattern: healthy spans
      duration_ms: 120
      status: ok
  ground_truth_root_cause: normal traffic spike without application fault / insufficient evidence
  affected_services:
  - checkout-service
  expected_actions:
  - Monitor only; no remediation
  keywords:
  - traffic spike
  - normal
  - no fault
  - insufficient
  live_chaos:
    service: checkout
    error_rate: 0.02
    extra_latency_ms: 0
    fault_mode: none
  split: core
  is_fault: false
