# CI for AIOps demo — keep the CV repo green without needing AWS or a full stack.
#
# Gates (honest layers)
# ---------------------
# 1. Compose file validity
# 2. Unit tests (services + scoring)
# 3. Offline anomaly: L0 F1 ≥ 0.70, core ≥ 0.75 (hard reported)
# 4. Offline RCA: core ≥ 0.85, holdout ≥ 0.55, strict ≥ 0.40, wrong-hop ≤ 0.25
# 5. Baselines: system must beat weak baselines (SRE baselines reported)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-and-eval:
    name: Unit tests + offline evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r shared/requirements-base.txt
          pip install -r aiops-services/anomaly-detector/requirements.txt
          pip install -r aiops-services/decision-engine/requirements.txt
          pip install -r aiops-services/engine-qa/requirements.txt
          pip install -r aiops-services/incident-manager/requirements.txt
          pip install -r aiops-services/remediation/requirements.txt
          pip install pyyaml pytest

      - name: Validate docker-compose
        run: docker compose config -q

      - name: Unit tests (per-service PYTHONPATH — each service uses package name `app`)
        run: |
          set -e
          ROOT="${{ github.workspace }}"
          export PYTHONPATH="$ROOT/shared:$ROOT/aiops-services/anomaly-detector"
          pytest -q aiops-services/anomaly-detector/tests
          export PYTHONPATH="$ROOT/shared:$ROOT/aiops-services/decision-engine"
          pytest -q aiops-services/decision-engine/tests
          export PYTHONPATH="$ROOT/shared:$ROOT/aiops-services/engine-qa"
          pytest -q aiops-services/engine-qa/tests
          export PYTHONPATH="$ROOT/shared:$ROOT/aiops-services/incident-manager"
          pytest -q aiops-services/incident-manager/tests
          export PYTHONPATH="$ROOT/shared:$ROOT/aiops-services/rca-engine"
          pytest -q aiops-services/rca-engine/tests
          export PYTHONPATH="$ROOT/shared:$ROOT/aiops-services/remediation"
          pytest -q aiops-services/remediation/tests
          export PYTHONPATH="$ROOT/shared"
          pytest -q apps/tests
          pytest -q evaluation/test_scoring.py

      - name: Offline anomaly evaluation (L0 F1 ≥ 0.70, core ≥ 0.75)
        env:
          PYTHONPATH: ${{ github.workspace }}/shared:${{ github.workspace }}/aiops-services/anomaly-detector:${{ github.workspace }}
        run: |
          python evaluation/evaluate_anomaly.py --split all \
            --output evaluation/results/anomaly_ci.json
          python - <<'PY'
          import json, sys
          from pathlib import Path
          d = json.loads(Path("evaluation/results/anomaly_ci.json").read_text())
          l0 = d.get("aggregate_l0") or d["aggregate"]
          f1 = float(l0["f1"])
          core = (d.get("by_split") or {}).get("core") or {}
          core_f1 = float(core.get("f1", f1))
          hard = d.get("aggregate_hard") or {}
          hard_f1 = hard.get("f1")
          print(f"anomaly L0 F1={f1:.3f} core_f1={core_f1:.3f} hard_f1={hard_f1} n_l0={l0.get('n')}")
          if f1 < 0.70:
              print("FAIL: anomaly L0 F1 below 0.70", file=sys.stderr)
              sys.exit(1)
          if core_f1 < 0.75:
              print("FAIL: anomaly core F1 below 0.75", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Offline RCA evaluation (core/holdout + strict + wrong-hop)
        env:
          PYTHONPATH: ${{ github.workspace }}/shared:${{ github.workspace }}/aiops-services/rca-engine:${{ github.workspace }}
        run: |
          python evaluation/evaluate_rca.py --mode offline --split all \
            --output evaluation/results/rca_ci.json
          python - <<'PY'
          import json, sys
          from pathlib import Path
          d = json.loads(Path("evaluation/results/rca_ci.json").read_text())
          agg = d["aggregate"]
          by = d.get("by_split") or {}
          core_acc = float((by.get("core") or {}).get("accuracy", agg.get("accuracy", 0)))
          hold_acc = float((by.get("holdout") or {}).get("accuracy", agg.get("accuracy", 0)))
          hard = by.get("hard") or {}
          strict = float(agg.get("accuracy_strict") or 0)
          wh = float(agg.get("wrong_hop_rate") or 0)
          print(
              f"RCA core={core_acc:.3f} holdout={hold_acc:.3f} "
              f"hard={hard.get('accuracy')} strict={strict:.3f} "
              f"wrong_hop={wh:.3f} n={agg.get('n')}"
          )
          print(f"grades={agg.get('grade_counts')} jaccard={agg.get('mean_jaccard')}")
          if core_acc < 0.85:
              print("FAIL: RCA core accuracy below 0.85", file=sys.stderr)
              sys.exit(1)
          if hold_acc < 0.55:
              print("FAIL: RCA holdout accuracy below 0.55", file=sys.stderr)
              sys.exit(1)
          if strict < 0.40:
              print("FAIL: RCA strict accuracy below 0.40", file=sys.stderr)
              sys.exit(1)
          if wh > 0.25:
              print("FAIL: wrong-hop rate above 0.25", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Baselines (system must beat weak baselines; report strong)
        env:
          PYTHONPATH: ${{ github.workspace }}/shared:${{ github.workspace }}/aiops-services/rca-engine:${{ github.workspace }}
        run: |
          python evaluation/evaluate_baselines.py \
            --output evaluation/results/baselines_ci.json \
            --require-beats-baselines
          python - <<'PY'
          import json
          from pathlib import Path
          d = json.loads(Path("evaluation/results/baselines_ci.json").read_text())
          print("beats_weak=", d.get("system_beats_baselines"))
          print("beats_strong=", d.get("system_beats_strong_baselines"))
          for k, v in (d.get("results") or {}).items():
              print(f"  {k}: acc={v.get('accuracy')} strict={v.get('accuracy_strict')}")
          PY

      - name: Evaluation summary
        run: |
          cp evaluation/results/anomaly_ci.json evaluation/results/anomaly_latest.json || true
          cp evaluation/results/rca_ci.json evaluation/results/rca_latest.json || true
          cp evaluation/results/baselines_ci.json evaluation/results/baselines_latest.json || true
          python evaluation/report_summary.py

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: evaluation/results/
          if-no-files-found: ignore
